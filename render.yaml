services:
  - type: web
    name: cloudguardrails-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: cloudguardrails-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: cloudguardrails-db
          property: password
      - key: JWT_SECRET
        sync: false
      - key: GUARDRAILS_ENCRYPTION_SECRET
        sync: false
      - key: GUARDRAILS_INGESTION_SECRET
        sync: false
      - key: GUARDRAILS_POLLING_ENABLED
        value: "true"
      - key: GUARDRAILS_POLLING_FIXED_RATE_MS
        value: "3600000"
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false
  - type: web
    name: cloudguardrails-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: cloudguardrails-db
    databaseName: cloud_guardrails
    user: cloudguardrails
    plan: free
    postgresMajorVersion: "17"
